<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Teacher Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f3f6fb;
}

/* Sidebar */

.sidebar{
position:fixed;
width:220px;
height:100%;
background:#6a7de3;
color:white;
padding-top:20px;
}

.sidebar h2{
text-align:center;
}

.sidebar a{
display:block;
padding:15px 20px;
color:white;
text-decoration:none;
}

.sidebar a:hover{
background:#5566c9;
}

/* Main */

.main{
margin-left:220px;
padding:20px;
}

/* Cards */

.cards{
display:flex;
gap:20px;
margin-top:20px;
}

.card{
flex:1;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
}

/* Sections */

.grid{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
margin-top:20px;
}

.panel{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
}

/* Tables */

table{
width:100%;
border-collapse:collapse;
}

td,th{
padding:10px;
border-bottom:1px solid #ddd;
}

</style>

</head>


<body>

<!-- Sidebar -->

<div class="sidebar">

<h2>Teacher</h2>

<a href="#">Dashboard</a>
<a href="students.html">Students</a>
<a href="marks.html">Marks Entry</a>
<a href="attendance.html">Attendance</a>
<a href="analysis.html">Performance</a>

</div>


<!-- Main -->

<div class="main">

<h1 id="welcome">Dashboard</h1>

<!-- Stats -->

<div class="cards">

<div class="card">
<h3>Total Students</h3>
<p id="totalStudents">0</p>
</div>

<div class="card">
<h3>Subjects</h3>
<p id="subjectsCount">0</p>
</div>

<div class="card">
<h3>Top Average</h3>
<p id="topAverage">0</p>
</div>

<div class="card">
<h3>Weak Students</h3>
<p id="weakCount">0</p>
</div>

</div>


<!-- Grid -->

<div class="grid">

<!-- Chart -->

<div class="panel">

<h3>Student Averages</h3>

<canvas id="avgChart"></canvas>

</div>


<!-- Top Students -->

<div class="panel">

<h3>Top Students</h3>

<table>

<thead>
<tr>
<th>Name</th>
<th>Average</th>
</tr>
</thead>

<tbody id="topStudentsTable"></tbody>

</table>

</div>

</div>


<!-- Subject Chart -->

<div class="panel">

<h3>Subject Performance</h3>

<canvas id="subjectChart"></canvas>

</div>

</div>


<script>

/* Teacher Name */

const teacher = JSON.parse(localStorage.getItem("teacher"))

if(teacher){
document.getElementById("welcome").innerText =
"Welcome " + teacher.name
}


/* Load Students */

async function loadStudents(){

const res = await fetch("http://localhost:5000/api/teachers/students")

const data = await res.json()

document.getElementById("totalStudents").innerText = data.length

}

loadStudents()


/* Load Subjects */

async function loadSubjects(){

const res = await fetch("http://localhost:5000/api/admin/subjects")

const data = await res.json()

document.getElementById("subjectsCount").innerText = data.length

}

loadSubjects()


/* Top Students */

async function loadTopStudents(){

const res = await fetch("http://localhost:5000/api/analysis/top-students")

const data = await res.json()

document.getElementById("topAverage").innerText = data[0]?.average_marks || 0

let html=""

data.forEach(s=>{

html+=`<tr>
<td>${s.name}</td>
<td>${parseFloat(s.average_marks).toFixed(1)}</td>
</tr>`

})

document.getElementById("topStudentsTable").innerHTML = html

}

loadTopStudents()


/* Weak Students */

async function loadWeak(){

const res = await fetch("http://localhost:5000/api/analysis/weak-students")

const data = await res.json()

document.getElementById("weakCount").innerText = data.length

}

loadWeak()


/* Student Average Chart */

async function loadAvgChart(){

const res = await fetch("http://localhost:5000/api/analysis/averages")

const data = await res.json()

const names = data.map(s=>s.name)

const marks = data.map(s=>s.average_marks)

new Chart(document.getElementById("avgChart"),{

type:"bar",

data:{
labels:names,
datasets:[{
label:"Average Marks",
data:marks
}]
}

})

}

loadAvgChart()


/* Subject Chart */

async function loadSubjectChart(){

const res = await fetch("http://localhost:5000/api/analysis/subjects")

const data = await res.json()

const names = data.map(s=>s.subject_name)

const marks = data.map(s=>s.average_marks)

new Chart(document.getElementById("subjectChart"),{

type:"bar",

data:{
labels:names,
datasets:[{
label:"Subject Average",
data:marks
}]
}

})

}

loadSubjectChart()

</script>

</body>
</html>
