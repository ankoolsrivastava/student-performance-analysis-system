<!doctype html>
<html>
  <head>
    <title>Students</title>

    <style>
      body {
        font-family: Arial;
        margin: 0;
        background: #f3f6fb;
      }

      /* Layout */

      .layout {
        display: flex;
        min-height: 100vh;
      }

      /* Sidebar */

      .sidebar {
        width: 220px;
        background: #6a7de3;
        color: white;
        padding-top: 20px;
      }

      .sidebar h2 {
        text-align: center;
      }

      .sidebar a {
        display: block;
        padding: 15px 20px;
        color: white;
        text-decoration: none;
      }

      .sidebar a:hover {
        background: #5566c9;
      }

      /* Main */

      .main {
        flex: 1;
        padding: 30px;
      }

      /* Top actions */

      .top-actions {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }

      /* Search */

      .search-box input {
        padding: 10px;
        width: 250px;
        border: 1px solid #ccc;
        border-radius: 5px;
      }

      /* Table */

      table {
        width: 100%;
        border-collapse: collapse;
        background: white;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      }

      th,
      td {
        padding: 12px;
        border-bottom: 1px solid #eee;
      }

      th {
        background: #6a7de3;
        color: white;
      }

      /* Buttons */

      button {
        padding: 6px 12px;
        background: #6a7de3;
        color: white;
        border: none;
        cursor: pointer;
        border-radius: 4px;
        margin-right: 4px;
      }

      button.delete {
        background: #dc2626;
      }

      button.edit {
        background: #16a34a;
      }

      button.add {
        background: #2563eb;
      }

      button:hover {
        opacity: 0.9;
      }
    </style>
  </head>

  <body>
    <div class="layout">
      <div class="main">
        <button onclick="goBack()">Back to Dashboard</button>

        <div class="top-actions">
          <h2>Students</h2>

          <button class="add" onclick="openAddStudent()">Add Student</button>
        </div>

        <div class="search-box">
          <input
            type="text"
            id="searchInput"
            placeholder="Search by name or roll number"
          />
        </div>

        <table>
          <thead>
            <tr>
              <th>Roll No</th>
              <th>Name</th>
              <th>Department</th>
              <th>Year</th>
              <th>Actions</th>
            </tr>
          </thead>

          <tbody id="studentTable"></tbody>
        </table>
      </div>
    </div>

    <script>
      function goBack() {
        window.location.href = "dashboard.html";
      }

      /* Load students */

      async function loadStudents() {
        const res = await fetch("http://localhost:5000/api/students");
        const data = await res.json();

        window.allStudents = data;

        displayStudents(data);
      }

      /* Display students */

      function displayStudents(students) {
        let html = "";

        students.forEach((s) => {
          html += `
<tr>
<td>${s.roll_number}</td>
<td>${s.name}</td>
<td>${s.department}</td>
<td>${s.year}</td>

<td>

<button onclick="openProfile(${s.student_id})">
View
</button>

<button class="edit" onclick="editStudent(${s.student_id})">
Edit
</button>

<button class="delete" onclick="deleteStudent(${s.student_id})">
Delete
</button>

</td>

</tr>
`;
        });

        document.getElementById("studentTable").innerHTML = html;
      }

      /* Open student profile */

      function openProfile(id) {
        window.location.href = "student-profile.html?id=" + id;
      }

      /* Add student */

      function openAddStudent() {
        window.location.href = "add-student.html";
      }

      /* Edit student */

      function editStudent(id) {
        window.location.href = "edit-student.html?id=" + id;
      }

      /* Delete student */

      async function deleteStudent(id) {
        if (!confirm("Are you sure you want to delete this student?")) return;

        try {
          const res = await fetch(`http://localhost:5000/api/students/${id}`, {
            method: "DELETE",
          });

          if (!res.ok) {
            throw new Error("Delete failed");
          }

          alert("Student deleted successfully");

          loadStudents();
        } catch (err) {
          console.error(err);
          alert("Error deleting student");
        }
      }

      /* Search */

      document
        .getElementById("searchInput")
        .addEventListener("keyup", function () {
          const keyword = this.value.toLowerCase();

          const filtered = window.allStudents.filter(
            (s) =>
              s.name.toLowerCase().includes(keyword) ||
              s.roll_number.toLowerCase().includes(keyword),
          );

          displayStudents(filtered);
        });

      /* Logout */

      function logout() {
        localStorage.removeItem("teacher");
        window.location.href = "login.html";
      }

      /* Start */

      loadStudents();
    </script>
  </body>
</html>
