<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Students - Teacher Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/gsap.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css"
    />

    <style>
      /*=============== FONTS & THEME =================*/
      @import url("https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&display=swap");

      :root {
        --first-color: hsl(263, 64%, 48%);
        --first-color-alt: hsl(263, 64%, 44%);

        /* Light Theme */
        --bg-color: #f4f7fe;
        --card-bg: #ffffff;
        --text-main: #2b3674;
        --text-muted: #a3aed1;
        --border-color: #e2e8f0;
        --input-bg: #f8fafc;

        --body-font: "Syne", sans-serif;
      }

      /* Dark Theme */
      [data-theme="dark"] {
        --bg-color: #0b0f19;
        --card-bg: #1a1f2e;
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
        --border-color: #2a3142;
        --input-bg: #0f172a;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: var(--bg-color);
        color: var(--text-main);
        overflow-x: hidden;
        transition:
          background-color 0.3s,
          color 0.3s;
      }

      h1,
      h2,
      h3,
      h4,
      th {
        font-family: var(--body-font);
        margin: 0;
      }

      /*=============== LAYOUT & SIDEBAR =================*/
      .layout {
        display: flex;
        min-height: 100vh;
      }

      .sidebar {
        width: 250px;
        flex-shrink: 0;
        background: var(--first-color);
        color: white;
        display: flex;
        flex-direction: column;
        box-shadow: 4px 0 15px rgba(0, 0, 0, 0.05);
        z-index: 20;
      }

      .sidebar h2 {
        text-align: center;
        padding: 30px 20px;
        font-size: 1.8rem;
        letter-spacing: 1px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        margin-bottom: 20px;
      }

      .sidebar a {
        display: block;
        padding: 16px 30px;
        color: rgba(255, 255, 255, 0.8);
        text-decoration: none;
        font-family: var(--body-font);
        font-weight: 600;
        transition: all 0.3s ease;
      }

      .sidebar a:hover,
      .sidebar a.active {
        background: var(--first-color-alt);
        color: white;
        padding-left: 38px;
      }

      /*=============== MAIN CONTENT =================*/
      .main {
        flex: 1;
        padding: 30px 40px;
        display: flex;
        flex-direction: column;
        gap: 25px;
        height: 100vh;
        overflow-y: auto;
        box-sizing: border-box;
      }

      /* Top Header Area (Profile) */
      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
        position: relative;
        z-index: 1000; /* Keeps header above the search bar container */
      }

      .topbar h1 {
        font-size: 2.2rem;
        color: var(--text-main);
      }

      /* Profile & Dropdown */

      /*=============== PAGE CONTROLS (Search & Add) =================*/
      .controls-container {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 15px;
        background: var(--card-bg);
        padding: 20px;
        border-radius: 16px;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.04);
        border: 1px solid var(--border-color);
        position: relative; /* Context for children */
        z-index: 10;
      }

      .search-box {
        position: relative;
        width: 100%;
        max-width: 350px;
      }

      .search-box i {
        position: absolute;
        left: 15px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-muted);
        font-size: 1.2rem;
      }

      .search-box input {
        width: 100%;
        padding: 12px 15px 12px 45px;
        border: 1px solid var(--border-color);
        border-radius: 30px;
        background: var(--input-bg);
        color: var(--text-main);
        font-family: var(--body-font);
        font-size: 0.95rem;
        outline: none;
        transition:
          border-color 0.3s,
          box-shadow 0.3s;
        box-sizing: border-box;
      }

      .search-box input:focus {
        border-color: var(--first-color);
        box-shadow: 0 0 0 3px hsla(263, 64%, 48%, 0.1);
      }

      /* Buttons */
      .btn {
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        font-family: var(--body-font);
        font-weight: 600;
        font-size: 0.95rem;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        transition: all 0.3s ease;
      }

      .btn-primary {
        background: var(--first-color);
        color: white;
      }
      .btn-primary:hover {
        background: var(--first-color-alt);
        transform: translateY(-2px);
      }

      .btn-view {
        background: #3b82f6;
        color: white;
        padding: 8px 12px;
        font-size: 0.85rem;
      }
      .btn-view:hover {
        background: #2563eb;
      }

      .btn-edit {
        background: #10b981;
        color: white;
        padding: 8px 12px;
        font-size: 0.85rem;
      }
      .btn-edit:hover {
        background: #059669;
      }

      .btn-delete {
        background: #ef4444;
        color: white;
        padding: 8px 12px;
        font-size: 0.85rem;
      }
      .btn-delete:hover {
        background: #dc2626;
      }

      .action-btns {
        display: flex;
        gap: 8px;
      }

      /*=============== TABLE =================*/
      .table-container {
        background: var(--card-bg);
        border-radius: 16px;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.04);
        padding: 20px;
        overflow-x: auto;
        border: 1px solid var(--border-color);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 600px;
      }

      th,
      td {
        padding: 16px 15px;
        text-align: left;
        border-bottom: 1px solid var(--border-color);
      }

      th {
        color: var(--text-muted);
        font-weight: 600;
        text-transform: uppercase;
        font-size: 0.85rem;
        letter-spacing: 0.5px;
      }

      td {
        font-weight: 500;
        color: var(--text-main);
      }

      tr:last-child td {
        border-bottom: none;
      }

      tbody tr {
        transition: background-color 0.2s;
      }

      tbody tr:hover {
        background-color: var(--input-bg);
      }
    </style>
  </head>

  <body>
    <div class="layout">
      <div class="sidebar">
        <h2>Teacher</h2>
        <a href="dashboard.html">Dashboard</a>
        <a href="students.html" class="active">Students</a>
        <a href="marks.html">Marks Entry</a>
        <a href="attendance.html">Attendance</a>
        <a href="analysis.html">Performance</a>
      </div>

      <div class="main">
        <header class="topbar">
          <h1>Students Management</h1>

          <div class="profile-wrapper">
            <div class="profile" id="profileBtn">
              <span id="teacherName"></span>
              <img id="profileImg" src="" alt="Profile" />
            </div>
          </div>
        </header>

        <div class="controls-container">
          <div class="search-box">
            <i class="ri-search-line"></i>
            <input
              type="text"
              id="searchInput"
              placeholder="Search by name or roll number..."
            />
          </div>

          <button class="btn btn-primary" onclick="openAddStudent()">
            <i class="ri-user-add-line"></i> Add New Student
          </button>
        </div>

        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>Roll No</th>
                <th>Name</th>
                <th>Department</th>
                <th>Year</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="studentTable"></tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
      /*===================================================================
          1. THEME TOGGLE & DROPDOWN LOGIC (Safeguarded)
        ===================================================================*/
      const themeBtn = document.getElementById("themeToggle");
      const themeIcon = document.getElementById("themeIcon");
      let currentTheme = localStorage.getItem("dashboard_theme") || "light";

      function applyTheme(theme) {
        document.body.setAttribute("data-theme", theme);

        // SAFETY CHECK: Skip if the icon isn't on this page
        if (!themeIcon) return;

        if (theme === "dark") {
          themeIcon.classList.remove("ri-moon-line");
          themeIcon.classList.add("ri-sun-line");
        } else {
          themeIcon.classList.remove("ri-sun-line");
          themeIcon.classList.add("ri-moon-line");
        }
      }

      applyTheme(currentTheme);

      // SAFETY CHECK: Only listen for clicks if button exists
      if (themeBtn) {
        themeBtn.addEventListener("click", () => {
          currentTheme = currentTheme === "light" ? "dark" : "light";
          localStorage.setItem("dashboard_theme", currentTheme);
          applyTheme(currentTheme);
        });
      }

      // Dropdown Logic (Safeguarded)
      const profileBtn = document.getElementById("profileBtn");
      const dropdown = document.getElementById("profileDropdown");

      // SAFETY CHECK: Only run dropdown logic if the dropdown actually exists
      if (profileBtn && dropdown) {
        profileBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          dropdown.classList.toggle("show");
        });

        window.addEventListener("click", (e) => {
          if (!dropdown.contains(e.target) && !profileBtn.contains(e.target)) {
            dropdown.classList.remove("show");
          }
        });
      }

      /* Teacher Name Setup */
      const teacher = JSON.parse(localStorage.getItem("teacher") || "{}");
      if (!localStorage.getItem("teacher")) {
        window.location.href = "login.html";
      }
      const teacherNameStr = teacher.name ? teacher.name : "Teacher";
      document.getElementById("teacherName").innerText = teacherNameStr;
      document.getElementById("profileImg").src =
        `https://ui-avatars.com/api/?name=${encodeURIComponent(teacherNameStr)}&background=6a7de3&color=fff&size=128`;

      /*===================================================================
          2. GSAP ANIMATIONS
        ===================================================================*/
      window.addEventListener("DOMContentLoaded", () => {
        const tl = gsap.timeline();
        tl.from(".sidebar", {
          x: -250,
          opacity: 0,
          duration: 0.8,
          ease: "power3.out",
        })
          .from(
            ".topbar",
            { y: -30, opacity: 0, duration: 0.6, ease: "power2.out" },
            "-=0.4",
          )
          .from(
            ".controls-container",
            { y: 20, opacity: 0, duration: 0.5, ease: "power2.out" },
            "-=0.2",
          )
          .from(
            ".table-container",
            { y: 30, opacity: 0, duration: 0.6, ease: "power3.out" },
            "-=0.2",
          );
      });

      /*===================================================================
          3. BACKEND LOGIC 
        ===================================================================*/

      /* Load students */
      async function loadStudents() {
        try {
          const res = await fetch("http://localhost:5000/api/students", {
            cache: "no-store",
          });

          if (!res.ok) throw new Error("Failed to fetch data");

          const data = await res.json();
          window.allStudents = data;
          displayStudents(data);

          // Debugging log added here
          console.log("Students loaded:", data);
        } catch (e) {
          console.error(e);
          document.getElementById("studentTable").innerHTML =
            `<tr><td colspan="5" style="text-align:center;color:var(--text-muted);">
      Failed to load students. Ensure server is running.
      </td></tr>`;
        }
      }

      /* Display students */
      function displayStudents(students) {
        let html = "";

        if (students.length === 0) {
          html = `<tr><td colspan="5" style="text-align: center; color: var(--text-muted);">No students found.</td></tr>`;
        } else {
          students.forEach((s) => {
            html += `
                    <tr>
                        <td>${s.roll_number}</td>
                        <td>${s.name}</td>
                        <td>${s.department}</td>
                        <td>${s.year}</td>
                        <td>
                            <div class="action-btns">
                                <button class="btn btn-view" onclick="openProfile(${s.student_id})">
                                    <i class="ri-eye-line"></i> View
                                </button>
                                <button class="btn btn-edit" onclick="editStudent(${s.student_id})">
                                    <i class="ri-edit-line"></i> Edit
                                </button>
                                <button class="btn btn-delete" onclick="deleteStudent(${s.student_id})">
                                    <i class="ri-delete-bin-line"></i> Delete
                                </button>
                            </div>
                        </td>
                    </tr>
                    `;
          });
        }
        document.getElementById("studentTable").innerHTML = html;
      }

      /* Search Logic */
      document
        .getElementById("searchInput")
        .addEventListener("keyup", function () {
          const keyword = this.value.toLowerCase();
          const rows = document.querySelectorAll("#studentTable tr");

          rows.forEach((row) => {
            const text = row.innerText.toLowerCase();
            // This checks name, roll number, and department all at once
            if (text.includes(keyword)) {
              row.style.display = "";
            } else {
              row.style.display = "none";
            }
          });
        });

      /* Actions */
      function openProfile(id) {
        window.location.href = "student-profile.html?id=" + id;
      }

      function openAddStudent() {
        window.location.href = "add-student.html";
      }

      function editStudent(id) {
        window.location.href = "edit-student.html?id=" + id;
      }

      async function deleteStudent(id) {
        if (!confirm("Are you sure you want to delete this student?")) return;

        try {
          const res = await fetch(`http://localhost:5000/api/students/${id}`, {
            method: "DELETE",
          });

          if (!res.ok) {
            throw new Error("Delete failed");
          }

          window.allStudents = window.allStudents.filter(
            (s) => s.student_id !== id,
          );

          const keyword = document
            .getElementById("searchInput")
            .value.toLowerCase();
          const filtered = window.allStudents.filter(
            (s) =>
              s.name.toLowerCase().includes(keyword) ||
              s.roll_number.toLowerCase().includes(keyword),
          );

          displayStudents(filtered);
        } catch (err) {
          console.error(err);
          alert("Error deleting student");
        }
      }

      function logout() {
        localStorage.removeItem("teacher");
        window.location.href = "login.html";
      }

      /* Start */
      loadStudents();
    </script>
  </body>
</html>
