<!doctype html>
<html>
  <head>
    <title>Add Student</title>

    <style>
      body {
        font-family: Arial;
        margin: 0;
        background: #f3f6fb;
      }

      /* Layout */

      .container {
        max-width: 700px;
        margin: 40px auto;
        background: white;
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      }

      h2 {
        margin-bottom: 20px;
      }

      /* Form */

      .form-group {
        margin-bottom: 15px;
      }

      label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
      }

      input,
      select {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
      }

      /* Buttons */

      .buttons {
        margin-top: 20px;
      }

      button {
        padding: 10px 16px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        margin-right: 10px;
      }

      .save {
        background: #2563eb;
        color: white;
      }

      .cancel {
        background: #6b7280;
        color: white;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>Add Student</h2>

      <form id="studentForm">
        <div class="form-group">
          <label>Name</label>
          <input type="text" id="name" required />
        </div>

        <div class="form-group">
          <label>Roll Number</label>
          <input type="text" id="roll" required />
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" />
        </div>

        <div class="form-group">
          <label>Phone</label>
          <input type="text" id="phone" />
        </div>

        <div class="form-group">
          <label>Parent Name</label>
          <input type="text" id="parent" />
        </div>

        <div class="form-group">
          <label>Parent Phone</label>
          <input type="text" id="parentPhone" />
        </div>

        <div class="form-group">
          <label>Address</label>
          <input type="text" id="address" />
        </div>

        <div class="form-group">
          <label>Date of Birth</label>
          <input type="date" id="dob" />
        </div>

        <div class="form-group">
          <label>Department</label>
          <input type="text" id="department" />
        </div>

        <div class="form-group">
          <label>Year</label>
          <select id="year">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
          </select>
        </div>

        <div class="buttons">
          <button type="submit" class="save">Save Student</button>

          <button type="button" class="cancel" onclick="goBack()">
            Cancel
          </button>
        </div>
      </form>
    </div>

    <script>
      /* Submit form */

      document
        .getElementById("studentForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          const student = {
            name: document.getElementById("name").value,
            roll_number: document.getElementById("roll").value,
            email: document.getElementById("email").value,
            phone: document.getElementById("phone").value,
            parent_name: document.getElementById("parent").value,
            parent_phone: document.getElementById("parentPhone").value,
            address: document.getElementById("address").value,
            date_of_birth: document.getElementById("dob").value,
            department: document.getElementById("department").value,
            year: document.getElementById("year").value,
          };

          await fetch("http://localhost:5000/api/students", {
            method: "POST",

            headers: {
              "Content-Type": "application/json",
            },

            body: JSON.stringify(student),
          });

          alert("Student added successfully");

          window.location.href = "students.html";
        });

      function goBack() {
        window.location.href = "students.html";
      }
    </script>
  </body>
</html>
